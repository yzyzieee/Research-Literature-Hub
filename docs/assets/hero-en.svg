<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="20" x2="1140" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FF"/>
      <stop offset="0.52" stop-color="#F8F7FF"/>
      <stop offset="1" stop-color="#EFFAF6"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3157D5"/>
      <stop offset="1" stop-color="#7250E7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#26375F" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#8190B3"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="125" fill="#DDF5EB" fill-opacity="0.65"/>
  <circle cx="90" cy="655" r="150" fill="#E1E9FF" fill-opacity="0.6"/>

  <g transform="translate(66 45)">
    <rect width="52" height="52" rx="14" fill="url(#brand)"/>
    <path d="M20 12V37M27 17V42M34 14V39" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <text x="70" y="24" fill="#17213A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="700">Research Literature Hub</text>
    <text x="70" y="48" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">One web app, two storage layers, reliable context for every team member's LLM</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="125" width="360" height="132" rx="22" fill="white"/>
  </g>
  <g transform="translate(452 153)">
    <rect width="56" height="56" rx="16" fill="#EEEAFE"/>
    <path d="M17 18H39V38H30L24 44V38H17V18Z" fill="#6B50D4"/>
    <circle cx="23" cy="28" r="1.7" fill="white"/>
    <circle cx="28" cy="28" r="1.7" fill="white"/>
    <circle cx="33" cy="28" r="1.7" fill="white"/>
    <text x="76" y="20" fill="#17213A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Research Literature Hub</text>
    <text x="76" y="45" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Upload · extract · verify · publish · review · export</text>
  </g>

  <path d="M600 267V310" stroke="#8190B3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="620" y="293" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Human-confirmed split</text>

  <g filter="url(#shadow)">
    <rect x="65" y="330" width="465" height="255" rx="24" fill="white"/>
    <rect x="670" y="330" width="465" height="255" rx="24" fill="white"/>
  </g>

  <path d="M600 310L297 330" stroke="#8190B3" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M600 310L902 330" stroke="#8190B3" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(93 358)">
    <rect width="58" height="58" rx="15" fill="#E9EEFF"/>
    <path d="M17 15H38L45 22V45H17V15Z" fill="#4967D8"/>
    <path d="M38 15V23H45" fill="#AFC0FF"/>
    <text x="76" y="22" fill="#17213A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">1. Team file storage</text>
    <text x="76" y="47" fill="#4967D8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Example: shared Google Drive folder</text>

    <text x="0" y="92" fill="#39425A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Stores the source material</text>
    <circle cx="8" cy="121" r="4" fill="#4967D8"/>
    <text x="22" y="126" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Original paper PDFs</text>
    <circle cx="8" cy="151" r="4" fill="#4967D8"/>
    <text x="22" y="156" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Normalized global filenames</text>
    <circle cx="8" cy="181" r="4" fill="#4967D8"/>
    <text x="22" y="186" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Team-controlled file permissions</text>
    <rect y="205" width="282" height="30" rx="15" fill="#F0F3FF"/>
    <text x="18" y="225" fill="#4967D8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Private/shared original-file layer</text>
  </g>

  <g transform="translate(698 358)">
    <rect width="58" height="58" rx="15" fill="#E4F7F0"/>
    <path d="M17 15H41V44H17V15Z" stroke="#2F9B76" stroke-width="3"/>
    <path d="M23 23H35M23 29H35M23 35H32" stroke="#2F9B76" stroke-width="2.5" stroke-linecap="round"/>
    <text x="76" y="22" fill="#17213A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">2. Public summary repository</text>
    <text x="76" y="47" fill="#2F8B6B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Example: public GitHub repository</text>

    <text x="0" y="92" fill="#39425A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Stores the trusted knowledge layer</text>
    <circle cx="8" cy="121" r="4" fill="#2F9B76"/>
    <text x="22" y="126" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Metadata and structured summaries</text>
    <circle cx="8" cy="151" r="4" fill="#2F9B76"/>
    <text x="22" y="156" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Team reviews, comments, and history</text>
    <circle cx="8" cy="181" r="4" fill="#2F9B76"/>
    <text x="22" y="186" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Search indexes and LLM catalogs</text>
    <rect y="205" width="282" height="30" rx="15" fill="#EBF8F3"/>
    <text x="18" y="225" fill="#2F8B6B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Public, versioned, LLM-readable layer</text>
  </g>

  <path d="M530 455H655" stroke="#8190B3" stroke-width="2.5" stroke-dasharray="7 8" marker-end="url(#arrow)"/>
  <rect x="536" y="416" width="119" height="28" rx="14" fill="#F7F5FF"/>
  <text x="550" y="435" fill="#6B50D4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">PDF reference only</text>

  <path d="M902 595V635" stroke="#8190B3" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(680 642)">
    <rect width="445" height="48" rx="24" fill="#17213A"/>
    <text x="28" y="30" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Catalog + selected records → each member's own LLM</text>
  </g>

  <g transform="translate(65 630)">
    <rect width="470" height="60" rx="18" fill="white" fill-opacity="0.9"/>
    <text x="24" y="25" fill="#39425A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">Required before deployment</text>
    <text x="24" y="46" fill="#65708A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">One team file-storage address + one public summary-repository address</text>
  </g>
</svg>
