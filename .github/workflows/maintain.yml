name: Maintain literature hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: maintain-main
  cancel-in-progress: false

jobs:
  maintain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Bump web app patch version
        working-directory: webapp
        run: npm version patch --no-git-tag-version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - name: Promote approved cards
        run: python scripts/promote.py
      - name: Synchronize key related papers
        run: python scripts/sync_key_references.py
      - name: Merge bibliographies
        run: python scripts/merge_bibtex.py
      - name: Scan tracked files for secrets
        run: python scripts/check_secrets.py
      - name: Rebuild index
        run: python scripts/update_index.py
      - name: Test key-reference synchronization
        run: python scripts/test_key_references.py
      - name: Sanity check
        run: python scripts/check_cards.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: bump version and maintain library"
          # The app pushes to main frequently, so another commit may land between
          # this run's checkout and push. Rebase onto it and retry instead of failing.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected; rebasing onto origin/main (attempt ${attempt})…"
            git pull --rebase --autostash origin main || true
          done
          echo "Could not push generated files after 5 attempts." >&2
          exit 1
